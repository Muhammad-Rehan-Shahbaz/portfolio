<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Muhammad Rehan — Full Stack MERN Developer based in Lahore, Pakistan. Building scalable web applications." />
    <meta name="keywords" content="Muhammad Rehan, MERN Developer, Full Stack, React, Node.js, Lahore" />
    <meta property="og:title" content="Muhammad Rehan | MERN Developer" />
    <meta property="og:description" content="Full Stack MERN Developer — Building the future, one line at a time." />
    <meta property="og:type" content="website" />
    <title>Muhammad Rehan | MERN Developer</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        background: #020408;
        color: #f0f6ff;
        font-family: 'DM Sans', sans-serif;
        overflow-x: hidden;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #020408; }
      ::-webkit-scrollbar-thumb { background: linear-gradient(#00d4ff, #7b2fff); border-radius: 2px; }

      /* Selection */
      ::selection { background: rgba(0,212,255,0.3); color: #f0f6ff; }

      /* Loader */
      #loader {
        position: fixed; inset: 0;
        background: #020408;
        display: flex; align-items: center; justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s, visibility 0.5s;
      }
      #loader.hidden { opacity: 0; visibility: hidden; }
      .loader-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 1.2rem;
        color: #00d4ff;
        letter-spacing: 0.1em;
      }
      .loader-text span {
        display: inline-block;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
  </head>
  <body>
    <!-- Loader -->
    <div id="loader">
      <div class="loader-text">
        initializing<span>_</span>
      </div>
    </div>

    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          document.getElementById('loader').classList.add('hidden');
        }, 1200);
      });
    </script>
  </body>
</html>
